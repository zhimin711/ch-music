spring.datasource.url=${MUSIC_DB_URL:jdbc:postgresql://localhost:5432/musicserver}
spring.datasource.username=${MUSIC_DB_USERNAME:musicserver}
spring.datasource.password=${MUSIC_DB_PASSWORD:musicserver}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.h2.console.enabled=false

spring.servlet.multipart.max-file-size=${MUSIC_UPLOAD_MAX_FILE_SIZE:500MB}
spring.servlet.multipart.max-request-size=${MUSIC_UPLOAD_MAX_REQUEST_SIZE:520MB}

music.storage.root=${MUSIC_STORAGE_ROOT:/var/lib/musicserver/music-storage}
music.upload.max-total-size=${MUSIC_UPLOAD_MAX_TOTAL_SIZE:40GB}
music.auth.token-ttl-days=${MUSIC_AUTH_TOKEN_TTL_DAYS:30}
music.cors.allowed-origins=${MUSIC_CORS_ALLOWED_ORIGINS:http://localhost:2389}

music.netease.enabled=${MUSIC_NETEASE_ENABLED:true}
music.netease.base-url=${MUSIC_NETEASE_BASE_URL:http://127.0.0.1:3000}
music.netease.connect-timeout=${MUSIC_NETEASE_CONNECT_TIMEOUT:2s}
music.netease.read-timeout=${MUSIC_NETEASE_READ_TIMEOUT:8s}
music.netease.rate-limit.anonymous-per-minute=${MUSIC_NETEASE_ANONYMOUS_PER_MINUTE:60}
music.netease.cache.enabled=${MUSIC_NETEASE_CACHE_ENABLED:true}
